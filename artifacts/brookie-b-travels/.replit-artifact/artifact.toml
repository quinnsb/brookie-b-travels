kind = "web"
previewPath = "/"
title = "Brookie B Travels"
version = "1.0.0"
id = "artifacts/brookie-b-travels"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18318

[services.development]
run = "pnpm --filter @workspace/brookie-b-travels run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/brookie-b-travels", "run", "build" ]
publicDir = "artifacts/brookie-b-travels/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18318"
BASE_PATH = "/"
